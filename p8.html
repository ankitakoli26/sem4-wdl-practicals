<html>
<head>
    <title>Calculator</title>

    <script>

        function calculate()
        {
            var a = parseInt(document.getElementById("n1").value);

            var b = parseInt(document.getElementById("n2").value);

            var op =
            document.getElementById("op").value;

            var result;

            switch(op)
            {
                case '+':
                    result = a + b;
                    break;

                case '-':
                    result = a - b;
                    break;

                case '*':
                    result = a * b;
                    break;

                case '/':
                    result = a / b;
                    break;
            }

            document.getElementById("ans").innerHTML =
            "Answer = " + result;
        }

    </script>

</head>

<body bgcolor="lightcyan">

<center>

<h1>Simple Calculator</h1>

Number 1 :
<input type="text" id="n1">

<br><br>

Number 2 :
<input type="text" id="n2">

<br><br>

Operator :
<select id="op">

    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>

</select>

<br><br>

<button onclick="calculate()">
    Calculate
</button>

<h2 id="ans"></h2>

</center>

</body>
</html>
